name: Daily NOAA NAO Fetcher

on:
  schedule:
    # Runs every day at 19:00 UTC (Adjust as needed based on NOAA updates)
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows you to manually trigger it via the GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas

    - name: Run Python script
      run: python fetch_nao.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add nao_7day_intervals_archive.csv || true
        git commit -m "Automated daily NOAA archive update" || true
        git push || true
