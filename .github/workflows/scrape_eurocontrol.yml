name: Daily Eurocontrol Scraper

on:
  schedule:
    # Runs daily at 19:00 UTC (Change as needed)
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pdfplumber requests

    - name: Run Scraper Script
      run: python scrape.py

    - name: Commit and Push CSV changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # Check if the file actually exists before running git ad
        if [ -f "data/eurocontrol_history.csv" ]; then
          git add data/eurocontrol_history.csv
          git diff-index --quiet HEAD || (git commit -m "Auto-update: Daily Eurocontrol Scraper Run" && git push)
        else
          echo "No CSV file was created by the script, skipping git commit."
        fi
