name: Daily NOAA & Schiphol Fetcher

on:
  schedule:
    # Draait elke dag om 19:00 UTC
    - cron: '0 19 * * *'
  workflow_dispatch: # Zodat je hem ook handmatig kunt starten via de knop

permissions:
  contents: write

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
    - name: Code ophalen uit repository
      uses: actions/checkout@v3

    - name: Python instellen
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Benodigde bibliotheken installeren
      run: |
        pip install pandas requests

    - name: Start NAO Script
      run: python fetch_nao.py

    - name: Start Schiphol Script
      run: python fetch_schiphol.py

    - name: Wijzigingen opslaan en pushen naar GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add *.csv || true
        git commit -m "Automatische dagelijkse update: NOAA & Schiphol" || true
        git push || true
