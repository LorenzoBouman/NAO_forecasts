name: Daily Eurocontrol NAT Scraper

on:
  schedule:
    # Runs daily at 18:15 UTC
    - cron: '15 18 * * *'
  workflow_dispatch: # Allows manual runs

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest
    permissions:
      # Required to write and push the CSV change to the repository
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pdfplumber
        playwright install chromium

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push CSV changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Only commit if the CSV file was modified or created
        if git status --porcelain | grep -q "nat_tracks_history.csv"; then
          git add nat_tracks_history.csv
          git commit -m "Auto-update NAT tracks history: $(date -u +'%Y-%m-%d')"
          git push
          echo "Changes committed and pushed successfully."
        else
          echo "No new data changes to commit."
        fi
